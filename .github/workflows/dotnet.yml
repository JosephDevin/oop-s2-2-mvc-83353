name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore oop-s2-2-mvc-83303/oop-s2-2-mvc-83303.csproj

      - name: Restore test dependencies
        run: dotnet restore oop-s2-2-mvc-83303.Tests/oop-s2-2-mvc-83303.Tests.csproj

      - name: Build main project
        run: dotnet build oop-s2-2-mvc-83303/oop-s2-2-mvc-83303.csproj --no-restore --configuration Release

      - name: Build test project
        run: dotnet build oop-s2-2-mvc-83303.Tests/oop-s2-2-mvc-83303.Tests.csproj --no-restore --configuration Release

      - name: Run tests
        run: >
          dotnet test oop-s2-2-mvc-83303.Tests/oop-s2-2-mvc-83303.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/*.trx
            **/TestResults/**/coverage.cobertura.xml
